services:
  geoserver-mcp:
    image: python:3.10-slim
    container_name: "${CONTAINER_NAME}"
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8000"
    environment:
      GEOSERVER_URL: "${GEOSERVER_URL}"
      GEOSERVER_USER: "${GEOSERVER_USER}"
      GEOSERVER_PASSWORD: "${GEOSERVER_PASSWORD}"
      GEOSERVER_STORAGE_PATH: /data
      MCP_TRANSPORT: "${MCP_TRANSPORT}"
      MCP_STREAMABLE_HTTP_PATH: "${MCP_STREAMABLE_HTTP_PATH}"
    volumes:
      - ./data:/data
    command: "sh -c 'pip install uv && uvx --from open-geoserver-mcp==1.0.8 geoserver-mcp --transport ${MCP_TRANSPORT} --host 0.0.0.0 --port 8000 --mount-path / --sse-path /sse --message-path /messages/ --streamable-http-path ${MCP_STREAMABLE_HTTP_PATH}'"
    healthcheck:
      test: "CMD-SHELL python -c \"import socket; socket.create_connection(('127.0.0.1', 8000), 5).close()\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
