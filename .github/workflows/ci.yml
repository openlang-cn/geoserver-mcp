name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src tests examples

      - name: Run mypy
        run: mypy src/geoserver_mcp

      - name: Run tests
        run: pytest tests -q --cov=geoserver_mcp --cov-report=term-missing --cov-fail-under=75

      - name: Run syntax compilation check
        run: python -m compileall src examples tests
